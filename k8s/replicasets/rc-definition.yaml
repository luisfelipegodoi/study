apiVersion: v1
kind: ReplicationController
metadata:
  name: "my-app-rc"
  labels: 
    app: "myapp"
    type: "frontend"
spec:
  template:
    metadata: 
      name: nginx-2
      labels:
        env: production
    spec:
      containers:
        - name: nginx
          image: nginx

  replicas: 3