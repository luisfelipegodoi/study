apiVersion: apps/v1
kind: Deployment
metadata: 
  name: myapp-deployment
  labels:
    app: myapp
    type: front-end
spec: 
  selector:
    matchLabels:
      app: myapp
  replicas: 6
  template:
    metadata: 
      name: myapp-pod
      labels:
        app: myapp
    spec:
      containers:
        - name: nginx-container
          image: nginx:1.12-perl
